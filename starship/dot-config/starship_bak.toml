# Kanagawa-inspired Starship Prompt
# Example (Starship doesn't support variables like CSS, so write the hex directly if needed)
fujiWhite    = "#DCD7BA"
waveBlue1    = "#223249"
crystalBlue  = "#7E9CD8"
autumnGreen  = "#76946A"
sakuraPink   = "#D27E99"
waveRed      = "#E46876"
springGreen  = "#98BB6C"
oldWhite     = "#C8C093"

format = """
[‚îå‚îÄ](bold $style)[ÓÇ∂](fg:waveBlue1 bg:none)$directory$git_branch$git_status$nodejs$rust$python
[‚îî‚îÄ>](bold $style) """

add_newline = false

[directory]
style = "fg:fujiWhite bg:waveBlue1"
format = "[ $path ]($style)[ÓÇ¥](fg:waveBlue1 bg:none)"
truncation_length = 3
truncation_symbol = "‚Ä¶/"

[git_branch]
symbol = "Ôêò"
style = "fg:crystalBlue bg:waveBlue1"
format = "[ $symbol $branch ]($style)"

[git_status]
style = "fg:autumnYellow bg:waveBlue1"
format = "[($all_status$ahead_behind )]($style)"

[nodejs]
symbol = "Óúò"
style = "fg:autumnGreen bg:waveBlue1"
format = "[ $symbol ($version) ]($style)"

[rust]
symbol = "Óû®"
style = "fg:sakuraPink bg:waveBlue1"
format = "[ $symbol ($version) ]($style)"

[python]
symbol = "Óàµ"
style = "fg:waveRed bg:waveBlue1"
format = "[ $symbol ($version) ]($style)"

[username]
style_user = "fg:oldWhite"
format = "[$user]($style) "

[hostname]
style = "fg:oldWhite"
format = "[@$hostname]($style) "

[character]
success_symbol = "[‚ûú](bold springGreen)"
error_symbol = "[‚úó](bold waveRed)"

[env_var.STYLE]
default = "sumiInk0"
